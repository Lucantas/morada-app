pre-commit:
  parallel: true
  commands:
    typecheck:
      root: apps/web/
      glob: 'apps/web/**/*.{ts,tsx}'
      run: pnpm typecheck
    lint:
      root: apps/web/
      glob: 'apps/web/**/*.{ts,tsx,js}'
      run: pnpm lint
    api-typecheck:
      root: apps/api/
      glob: 'apps/api/**/*.ts'
      run: pnpm typecheck
    api-lint:
      root: apps/api/
      glob: 'apps/api/**/*.ts'
      run: pnpm lint
    format:
      glob: '*.{ts,tsx,js,json,md,css}'
      run: pnpm prettier --check {staged_files}

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
    spec-gate:
      run: node scripts/check-spec-trailer.mjs --commit-msg {1}

pre-push:
  commands:
    test:
      root: apps/web/
      run: pnpm test:coverage
    api-test:
      run: make api-test
    spec-gate:
      run: node scripts/check-spec-trailer.mjs --range origin/main..HEAD
