name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm --filter @morada/web typecheck
      - run: pnpm --filter @morada/web lint
      - run: pnpm --filter @morada/web test:coverage

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: morada
          POSTGRES_PASSWORD: morada
          POSTGRES_DB: morada
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U morada -d morada"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @morada/api typecheck
      - run: pnpm --filter @morada/api lint
      - run: pnpm --filter @morada/api test:coverage
        env:
          DATABASE_URL: postgres://morada:morada@localhost:5433/morada

  spec-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check spec trailers on every commit in range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            RANGE="$PR_BASE_SHA..$PR_HEAD_SHA"
          else
            case "$PUSH_BEFORE_SHA" in
              ''|0000000000000000000000000000000000000000)
                echo "No previous SHA for this push; skipping spec-gate."
                exit 0
                ;;
            esac
            RANGE="$PUSH_BEFORE_SHA..HEAD"
          fi
          echo "spec-gate range: $RANGE"
          node scripts/check-spec-trailer.mjs --range "$RANGE"
