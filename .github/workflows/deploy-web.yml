name: Deploy Web

# Builds the web and deploys it to Cloudflare Pages on a green CI run on main,
# and on manual dispatch. The Pages worker (public/_worker.js) proxies /api/*
# and /auth/* to the API origin, so the web calls it same-origin and no
# cross-site API URL is needed at build time.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @morada/web build
        env:
          VITE_API_URL: ''
      - run: pnpm dlx wrangler@4 pages deploy apps/web/dist --project-name=morada --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
